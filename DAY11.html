<!DOCTYPE html>
<html>
    <head>
        <title>day 11 cls</title>
        <style>
            body{
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                background-color: lightseagreen;
            }
            h1{
                color: brown;
                text-align: center;
                margin-bottom: 70px;
            }
            .button{
               display: flex;
               width: 400px;
               flex-direction: column;
               gap: 15px;
               padding-right: 40px;
            }
             .box{
                display: flex;
                border-radius: 90px;
                padding: 15px;
                height: 50px;
                width: 400px;
                justify-content:start;
                font-size: 30px;
            } 
            .circle{
                display: flex;
                height: 50px;
                width: 50px;
                border-radius: 40px;
                margin-left: 20px;
                margin-right: 70px;
                text-align: center; 
                font-size: 30px; 
                background: rgba(169, 159, 159, 0.873);
            }
            .b1{ background-color: rgb(246, 255, 0);}
            .b2{ background-color: rgb(0, 153, 255);}
            .b3{ background-color: rgb(0, 255, 76); }
            .b4{ background-color: rgb(255, 0, 204); }
            .b5{ background-color: rgb(144, 0, 255); }
            .b6{ background-color: #ff9500; }
            .b7{ background-color: rgb(255, 0, 238);}
        </style>
    </head>
    <body>
        <h1>How does CSS work?</h1>
        <div class="button">
            <div class=" box b1">
                <div class="circle">01</div>selecting elements</div>
            <div class="box b2">
                <div class="circle" >02</div>visual style</div>
            <div class="box b3">
                <div class="circle">03</div> cascading rules</div>
            <div class="box b4">
                <div class="circle">04</div> hierarchy</div>
            <div class="box b5">
                <div class="circle">05</div> stylelesheat</div>
            <div class="box b6">
                <div class="circle">06</div>rendering</div>
            <div class="box b7">
                <div class="circle">07</div> changes</div>
        </div>
    </body>
</html>
