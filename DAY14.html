<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>day 14 cls</title>
    <style>
        .box{
            height: 40px;
            width: 100px;
            border-radius: 40px;
            border: 4px solid blue;
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            font-size: 20px;
        }
        .sphere{
            height: 40px;
            width: 100px;
            border:4px solid yellow ;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            border-radius: 100px 100px 0px 0px;
        }
        .bull{
            height: 40px;
            width: 100px;
            border:4px solid brown ;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            border-radius: 0px 100px 100px 0px;
        }
        .leaf{
            height: 40px;
            width: 100px;
            border:4px solid black ;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            border-radius: 100px 0px 100px 0px;
        }
        .box1{
            height: 400px;
            width: 500px;
            background-color: rgb(255, 111, 0);
            margin-left: 400px;
        }
        .box2{
            display: grid;
            grid-template-columns: repeat(2,2fr); 
            gap: 20px;
        }
        .box2 div{
                background-color:rgb(203, 123, 192);
                padding: 20px;
                width: 50px;
                height: 30px;
                margin-left: 100px;
                margin-top: 90px;
            }
        .box3{
            display: flex;
            flex-direction: row;
            height: 400px;
            width: 500px;
            background-color: rgb(232, 12, 177);
            margin-left: 400px;
            
        }
        .sp1{
            height: 40px;
            width: 100px;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            border-radius: 100px 100px 0px 0px;
            margin-top: 100px;
            margin-left: 30px;
            background-color: rgb(128, 0, 255);
        }
        .sp2{
            height: 40px;
            width: 100px;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            margin-top: 180px;
            border-radius: 0px 0px 100px 100px;
            background-color:rgb(128, 0, 255);
        }
        .sp3{
            height: 40px;
            width: 100px;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            border-radius:100px 100px 0px 0px;
            margin-top: 100px;
            background-color:rgb(128, 0, 255);
        }
        .cir{
            display: grid;
            grid-template-columns: repeat(2,2fr); 
        }
        
         .c1{
            height: 180px;
            width: 180px;
            border:4px solid rgb(14, 14, 1) ;
            border-radius: 200px 0px 0px 0px;
            background-color: lightblue;
            margin-left: 500px;
        }
         .c2{
            height: 180px;
            width: 180px;
            border:4px solid rgb(14, 14, 1) ;
            border-radius: 0px 200px 0px 0px;
            background-color: rgb(224, 136, 13);
            margin-right: 700px;
        }
         .c3{
            height: 180px;
            width: 180px;
            border:4px solid rgb(14, 14, 1) ;
            border-radius: 0px 0px 0px 200px;
            margin-left: 500px;
            background-color: rgb(243, 14, 22);
        }
         .c4{
            height: 180px;
            width: 180px;
            border:4px solid rgb(14, 14, 1) ;
            background-color: rgb(11, 68, 190);
            border-radius: 0px 0px 200px 0px;
            margin-bottom: 1px;


        }
        
    </style>
</head>
<body>

    <h1 style="text-align: center;">SHAPES</h1>

    <h1>rectangle</h1>
    <div class="box">rectangle</div>

    <h1>hemisphere</h1>
    <div class="sphere">hemisphere</div>

    <h1>bullet</h1>
    <div class="bull">bullet</div>

    <h1>leaf</h1>
    <div class="leaf">leaff</div>

    <h1>boxes</h1>
    <div class="box1">
        <div class="box2">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        </div>
    </div>

    <h1>curve</h1>
    <div class="box3">
    <div class="sp1"></div>
    <div class="sp2"></div>
    <div class="sp3"></div>
    </div>  

    <h1>circle</h1>
    <div class="cir">

    <div class="c1"></div>
    <div class="c2"></div>
    <div class="c3"></div>
    <div class="c4"></div>
    </div>
</body>
</html>
